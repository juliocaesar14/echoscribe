<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Echoscribe</title>
<style>
body {
  font-family: Arial, sans-serif;
  width: 320px;
  margin: 0;
  padding: 10px;
  background-color: #1a1a2e;
  color: #ffffff;
}
h1 {
  font-size: 14px;
  margin: 0 0 8px 0;
}
#status {
  font-size: 11px;
  color: #aaaaaa;
  margin-bottom: 8px;
}
.caption-row {
  border-bottom: 1px solid #333344;
  padding: 6px 0;
}
.source-label {
  font-size: 10px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 4px;
  margin-right: 6px;
}
.source-microphone {
  background-color: #2dd4bf;
  color: #003333;
}
.source-system_audio {
  background-color: #f97373;
  color: #330000;
}
.caption-text {
  font-size: 12px;
  display: block;
  margin-top: 4px;
}
</style>
</head>
<body>
<h1>Echoscribe Live Captions</h1>
<div id="status">Connecting to backend</div>
<div id="captions"></div>
<script src="echoscribe_popup.js"></script>
</body>
</html>
