<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Echoscribe</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="header">
    <div id="header-left">
      <span id="status-dot"></span>
      <span id="status">Connecting...</span>
    </div>
    <span id="app-name">Echoscribe</span>
  </div>

  <div id="captions">
    <div class="section">
      <div class="section-label">
        <span class="section-icon">mic</span>
        Microphone
      </div>
      <div id="mic-captions" class="caption-box"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-label">
        <span class="section-icon">volume_up</span>
        System Audio
      </div>
      <div id="sys-captions" class="caption-box"></div>
    </div>
  </div>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="popup.js"></script>
</body>
</html>
